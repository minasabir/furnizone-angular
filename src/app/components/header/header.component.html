<header class="sticky top-0 z-50 w-full border-b border-border bg-white shadow-sm">
  <div class="container">
    <!-- Top bar -->
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <a routerLink="/" class="flex items-center space-x-2">
        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
          <span class="text-white text-xl font-bold">FZ</span>
        </div>
        <span class="text-2xl font-bold text-primary">FurniZone</span>
      </a>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center space-x-8">
        <a routerLink="/" 
           class="text-base hover:text-primary transition-colors"
           [class.text-primary]="isActive('/')"
           [class.font-medium]="isActive('/')"
           [class.text-foreground]="!isActive('/')">
          Home
        </a>
        <a routerLink="/products"
           class="text-base hover:text-primary transition-colors"
           [class.text-primary]="isActive('/products')"
           [class.font-medium]="isActive('/products')"
           [class.text-foreground]="!isActive('/products')">
          Products
        </a>
        <a routerLink="/categories"
           class="text-base hover:text-primary transition-colors"
           [class.text-primary]="isActive('/categories')"
           [class.font-medium]="isActive('/categories')"
           [class.text-foreground]="!isActive('/categories')">
          Categories
        </a>
      </nav>

      <!-- Search bar - Desktop -->
      <form (ngSubmit)="onSearch()" class="hidden md:flex items-center flex-1 max-w-md mx-8">
        <div class="relative w-full">
          <input
            type="text"
            placeholder="Search furniture..."
            [(ngModel)]="searchQuery"
            name="search"
            class="w-full h-10 pl-4 pr-10 rounded-lg border border-border bg-background focus:outline-none focus:ring-2 focus:ring-primary/20"
          />
          <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-primary">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </button>
        </div>
      </form>

      <!-- Actions -->
      <div class="flex items-center space-x-4">
        <a routerLink="/wishlist" class="relative hidden md:block">
          <svg class="w-6 h-6 text-foreground hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
          </svg>
        </a>

        <a routerLink="/cart" class="relative">
          <svg class="w-6 h-6 text-foreground hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>
          <span *ngIf="cartItemCount > 0" class="absolute -top-2 -right-2 bg-primary text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
            {{ cartItemCount }}
          </span>
        </a>

        <div *ngIf="isAuthenticated" class="relative group hidden md:block">
          <button class="flex items-center space-x-2 hover:text-primary transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <span class="text-sm">{{ userName }}</span>
          </button>
          <div class="absolute right-0 mt-2 w-48 bg-white border border-border rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
            <a routerLink="/profile" class="block px-4 py-2 hover:bg-secondary rounded-t-lg">Profile</a>
            <a routerLink="/orders" class="block px-4 py-2 hover:bg-secondary">My Orders</a>
            <button (click)="logout()" class="block w-full text-left px-4 py-2 hover:bg-secondary text-destructive rounded-b-lg">
              Logout
            </button>
          </div>
        </div>

        <a *ngIf="!isAuthenticated" routerLink="/login" class="hidden md:block">
          <button class="btn-primary text-sm">Login</button>
        </a>

        <!-- Mobile menu button -->
        <button (click)="toggleMobileMenu()" class="md:hidden text-foreground">
          <svg *ngIf="!mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
          <svg *ngIf="mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Search -->
    <form (ngSubmit)="onSearch()" class="md:hidden pb-4">
      <div class="relative">
        <input
          type="text"
          placeholder="Search furniture..."
          [(ngModel)]="searchQuery"
          name="mobileSearch"
          class="w-full h-10 pl-4 pr-10 rounded-lg border border-border bg-background focus:outline-none focus:ring-2 focus:ring-primary/20"
        />
        <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </button>
      </div>
    </form>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="mobileMenuOpen" class="md:hidden border-t border-border bg-white">
    <nav class="container py-4 space-y-2">
      <a routerLink="/" (click)="mobileMenuOpen = false" class="block py-2 text-base hover:text-primary transition-colors">
        Home
      </a>
      <a routerLink="/products" (click)="mobileMenuOpen = false" class="block py-2 text-base hover:text-primary transition-colors">
        Products
      </a>
      <a routerLink="/categories" (click)="mobileMenuOpen = false" class="block py-2 text-base hover:text-primary transition-colors">
        Categories
      </a>
      <a routerLink="/wishlist" (click)="mobileMenuOpen = false" class="block py-2 text-base hover:text-primary transition-colors">
        Wishlist
      </a>
      <ng-container *ngIf="isAuthenticated; else mobileGuest">
        <a routerLink="/profile" (click)="mobileMenuOpen = false" class="block py-2 text-base hover:text-primary transition-colors">
          Profile
        </a>
        <a routerLink="/orders" (click)="mobileMenuOpen = false" class="block py-2 text-base hover:text-primary transition-colors">
          My Orders
        </a>
        <button (click)="logout(); mobileMenuOpen = false" class="block w-full text-left py-2 text-base text-destructive">
          Logout
        </button>
      </ng-container>
      <ng-template #mobileGuest>
        <a routerLink="/login" (click)="mobileMenuOpen = false" class="block py-2">
          <button class="btn-primary w-full text-sm">Login</button>
        </a>
      </ng-template>
    </nav>
  </div>
</header>
