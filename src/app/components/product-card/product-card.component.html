<div class="card cursor-pointer group" (click)="navigateToProduct()">
  <!-- Image -->
  <div class="relative aspect-[4/3] overflow-hidden rounded-t-xl">
    <img
      [src]="product.imageUrls[0] || 'https://via.placeholder.com/400x300?text=No+Image'"
      [alt]="product.name"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
    />
    <!-- Wishlist button -->
    <button
      (click)="onToggleWishlist($event)"
      class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white shadow-md flex items-center justify-center hover:bg-primary hover:text-white transition-colors"
      [class.text-red-500]="isInWishlist"
      [class.text-gray-400]="!isInWishlist"
    >
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </button>
    <!-- Stock badge -->
    <div *ngIf="product.stock <= 5 && product.stock > 0" class="absolute top-3 left-3 bg-orange-500 text-white text-xs px-2 py-1 rounded">
      Low Stock
    </div>
    <div *ngIf="product.stock === 0" class="absolute top-3 left-3 bg-gray-500 text-white text-xs px-2 py-1 rounded">
      Out of Stock
    </div>
  </div>

  <!-- Content -->
  <div class="p-4">
    <p class="text-xs text-muted-foreground mb-1">{{ product.categoryName }}</p>
    <h3 class="font-semibold text-foreground mb-1 line-clamp-1">{{ product.name }}</h3>
    
    <!-- Rating -->
    <div class="flex items-center mb-2">
      <div class="flex text-yellow-400 text-sm">
        <span *ngFor="let star of [1,2,3,4,5]">
          <svg class="w-4 h-4" [class.text-yellow-400]="star <= product.rating" [class.text-gray-300]="star > product.rating" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
          </svg>
        </span>
      </div>
      <span class="text-xs text-muted-foreground ml-1">({{ product.reviewCount }})</span>
    </div>

    <!-- Price and Add to Cart -->
    <div class="flex items-center justify-between">
      <span class="text-lg font-bold text-primary">${{ product.price | number:'1.2-2' }}</span>
      <button
        (click)="onAddToCart($event)"
        [disabled]="product.stock === 0"
        class="btn-primary text-sm py-1.5 px-3 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
      </button>
    </div>
  </div>
</div>
