<div class="min-h-screen bg-background">
  <div class="container py-8">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl md:text-4xl font-bold text-foreground mb-4">Products</h1>
      
      <!-- Search and filters -->
      <div class="flex flex-col md:flex-row gap-4 mb-6">
        <div class="flex-1">
          <form (ngSubmit)="onSearch()" class="relative">
            <input
              type="text"
              [(ngModel)]="searchQuery"
              name="search"
              placeholder="Search products..."
              class="input w-full pl-10"
            />
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </form>
        </div>
        
        <!-- Sort dropdown -->
        <div class="flex gap-2">
          <select [(ngModel)]="sortBy" (change)="onSortChange(sortBy)" class="input w-auto">
            <option value="name">Name</option>
            <option value="price">Price</option>
            <option value="createdAt">Newest</option>
            <option value="rating">Rating</option>
          </select>
          <button (click)="sortOrder = sortOrder === 'asc' ? 'desc' : 'asc'; loadProducts()" class="btn-outline px-3">
            <svg *ngIf="sortOrder === 'asc'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
            </svg>
            <svg *ngIf="sortOrder === 'desc'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
      <!-- Sidebar Filters -->
      <aside class="w-full lg:w-64 flex-shrink-0">
        <div class="bg-white rounded-xl border border-border p-6">
          <div class="flex justify-between items-center mb-4">
            <h3 class="font-semibold">Filters</h3>
            <button (click)="clearFilters()" class="text-sm text-primary hover:underline">Clear all</button>
          </div>

          <!-- Categories -->
          <div class="mb-6">
            <h4 class="font-medium mb-3">Categories</h4>
            <div class="space-y-2">
              <label *ngFor="let category of categories" class="flex items-center cursor-pointer">
                <input
                  type="radio"
                  name="category"
                  [value]="category.id"
                  [checked]="selectedCategory === category.id"
                  (change)="onCategoryChange(category.id)"
                  class="mr-2"
                />
                <span class="text-sm">{{ category.name }}</span>
              </label>
              <label class="flex items-center cursor-pointer">
                <input
                  type="radio"
                  name="category"
                  value=""
                  [checked]="selectedCategory === ''"
                  (change)="onCategoryChange('')"
                  class="mr-2"
                />
                <span class="text-sm">All Categories</span>
              </label>
            </div>
          </div>

          <!-- Price Range -->
          <div class="mb-6">
            <h4 class="font-medium mb-3">Price Range</h4>
            <div class="flex gap-2">
              <input
                type="number"
                [(ngModel)]="minPrice"
                placeholder="Min"
                class="input w-1/2 text-sm"
                (change)="onPriceChange()"
              />
              <input
                type="number"
                [(ngModel)]="maxPrice"
                placeholder="Max"
                class="input w-1/2 text-sm"
                (change)="onPriceChange()"
              />
            </div>
          </div>

          <!-- Materials -->
          <div>
            <h4 class="font-medium mb-3">Materials</h4>
            <div class="flex flex-wrap gap-2">
              <button
                *ngFor="let material of materials"
                (click)="onMaterialChange(material)"
                class="px-3 py-1 rounded-full text-sm border transition-colors"
                [class.bg-primary]="selectedMaterial === material"
                [class.text-white]="selectedMaterial === material"
                [class.border-primary]="selectedMaterial === material"
                [class.border-border]="selectedMaterial !== material"
                [class.hover:border-primary]="selectedMaterial !== material"
              >
                {{ material }}
              </button>
            </div>
          </div>
        </div>
      </aside>

      <!-- Products Grid -->
      <div class="flex-1">
        <!-- Results count -->
        <p class="text-muted-foreground mb-4">
          Showing {{ products.length }} of {{ totalCount }} products
        </p>

        <!-- Loading skeletons -->
        <div *ngIf="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <div *ngFor="let i of [1,2,3,4,5,6]" class="bg-white rounded-xl border border-border h-96 animate-pulse">
            <div class="h-48 bg-gray-200 rounded-t-xl"></div>
            <div class="p-4 space-y-3">
              <div class="h-4 bg-gray-200 rounded w-1/3"></div>
              <div class="h-4 bg-gray-200 rounded w-3/4"></div>
              <div class="h-4 bg-gray-200 rounded w-1/2"></div>
            </div>
          </div>
        </div>

        <!-- Products -->
        <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
        </div>

        <!-- Empty state -->
        <div *ngIf="!loading && products.length === 0" class="text-center py-12">
          <svg class="w-16 h-16 mx-auto text-muted-foreground mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
          </svg>
          <h3 class="text-lg font-medium mb-2">No products found</h3>
          <p class="text-muted-foreground">Try adjusting your filters or search query.</p>
        </div>

        <!-- Pagination -->
        <div *ngIf="totalPages > 1" class="flex justify-center mt-8">
          <div class="flex items-center gap-2">
            <button
              (click)="onPageChange(currentPage - 1)"
              [disabled]="currentPage === 1"
              class="btn-outline px-3 py-2 disabled:opacity-50"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
              </svg>
            </button>
            
            <button
              *ngFor="let page of pages"
              (click)="onPageChange(page)"
              class="px-4 py-2 rounded-lg font-medium transition-colors"
              [class.bg-primary]="currentPage === page"
              [class.text-white]="currentPage === page"
              [class.text-foreground]="currentPage !== page"
              [class.hover:bg-secondary]="currentPage !== page"
            >
              {{ page }}
            </button>
            
            <button
              (click)="onPageChange(currentPage + 1)"
              [disabled]="currentPage === totalPages"
              class="btn-outline px-3 py-2 disabled:opacity-50"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
