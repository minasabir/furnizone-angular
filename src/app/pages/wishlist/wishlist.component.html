<div class="min-h-screen bg-background py-8">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-foreground">My Wishlist</h1>
      <button
        *ngIf="wishlistProducts.length > 0"
        (click)="clearWishlist()"
        class="text-sm text-destructive hover:text-destructive/80 transition-colors"
      >
        Clear All
      </button>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <div *ngFor="let i of [1,2,3,4]" class="bg-white rounded-lg overflow-hidden shadow-sm animate-pulse">
        <div class="aspect-square bg-gray-200"></div>
        <div class="p-4 space-y-3">
          <div class="h-4 bg-gray-200 rounded w-3/4"></div>
          <div class="h-4 bg-gray-200 rounded w-1/2"></div>
          <div class="h-8 bg-gray-200 rounded"></div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && wishlistProducts.length === 0" class="text-center py-16">
      <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
      </svg>
      <h3 class="text-xl font-semibold text-foreground mb-2">Your wishlist is empty</h3>
      <p class="text-muted-foreground mb-6">Save items you love to your wishlist and revisit them anytime.</p>
      <button
        (click)="navigateToProducts()"
        class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-primary/90 transition-colors"
      >
        Browse Products
      </button>
    </div>

    <!-- Wishlist Grid -->
    <div *ngIf="!loading && wishlistProducts.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <div
        *ngFor="let product of wishlistProducts"
        class="bg-white rounded-lg overflow-hidden shadow-sm hover:shadow-md transition-shadow group"
      >
        <!-- Image -->
        <div class="relative aspect-square bg-gray-100 overflow-hidden cursor-pointer" (click)="navigateToProduct(product.id)">
          <img
            *ngIf="product.imageUrls && product.imageUrls.length > 0"
            [src]="product.imageUrls[0]"
            [alt]="product.name"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
          />
          <div *ngIf="!product.imageUrls || product.imageUrls.length === 0" class="w-full h-full flex items-center justify-center text-gray-400">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>

          <!-- Remove Button -->
          <button
            (click)="removeFromWishlist(product.id); $event.stopPropagation()"
            class="absolute top-3 right-3 w-8 h-8 bg-white rounded-full shadow-md flex items-center justify-center text-destructive hover:bg-destructive hover:text-white transition-colors"
          >
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- Product Info -->
        <div class="p-4">
          <h3
            class="font-semibold text-foreground mb-1 line-clamp-1 cursor-pointer hover:text-primary transition-colors"
            (click)="navigateToProduct(product.id)"
          >
            {{ product.name }}
          </h3>
          <p class="text-sm text-muted-foreground mb-3 line-clamp-2">{{ product.description }}</p>
          
          <div class="flex items-center justify-between">
            <span class="font-bold text-primary">${{ product.price.toFixed(2) }}</span>
            <button
              (click)="addToCart(product)"
              class="bg-primary text-white px-3 py-1.5 rounded text-sm hover:bg-primary/90 transition-colors"
            >
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
