<div class="min-h-screen bg-background">
  <div class="container py-8">
    <h1 class="text-3xl md:text-4xl font-bold text-foreground mb-4">Categories</h1>
    <p class="text-muted-foreground mb-8">Browse furniture by room type</p>

    <!-- Loading -->
    <div *ngIf="loading" class="text-center py-12">
      <svg class="animate-spin h-8 w-8 mx-auto text-primary" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
    </div>

    <!-- Categories Grid -->
    <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let category of categories" class="card hover:shadow-lg transition-shadow">
        <div class="p-6">
          <!-- Icon and Name -->
          <div class="flex items-center gap-4 mb-4">
            <div class="w-14 h-14 rounded-xl bg-primary/10 text-primary flex items-center justify-center">
              <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getCategoryIconPath(category.name)"></path>
              </svg>
            </div>
            <div>
              <h3 class="text-xl font-semibold">{{ category.name }}</h3>
              <p class="text-muted-foreground text-sm">{{ category.description || 'Explore our collection' }}</p>
            </div>
          </div>

          <!-- Product Preview -->
          <div *ngIf="categoryProducts[category.id]?.length" class="grid grid-cols-2 gap-2 mb-4">
            <img *ngFor="let product of categoryProducts[category.id] | slice:0:4"
                 [src]="product.imageUrls[0] || 'https://via.placeholder.com/200'"
                 [alt]="product.name"
                 class="w-full h-24 object-cover rounded-lg" />
          </div>

          <!-- View All Link -->
          <a [routerLink]="['/products']"
             [queryParams]="{ categoryId: category.id }"
             class="flex items-center justify-center w-full py-3 rounded-lg border border-border hover:bg-secondary transition-colors">
            <span class="font-medium">View All {{ category.name }}</span>
            <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
